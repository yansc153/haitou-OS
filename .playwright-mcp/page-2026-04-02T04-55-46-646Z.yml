            - generic [ref=e259]:
              - paragraph [ref=e260]: We aim to build a space where creators make sustainable incomes with their content. To kickstart and allow creators to focus on making the best content possible, we’re offering between US$6,000 to $12,000 without risk or repayment in return for 10–20% ownership.
              - paragraph [ref=e261]: You can make revenue through two main channels — direct sales and as part of shared access cards, such as SuperHi membership, where your revenue is based on the level of engagement your content receives across the creators.
              - link "Go to revenue calculator" [ref=e262] [cursor=pointer]:
                - /url: /calculator
                - text: View calculator
            - generic [ref=e263]:
              - paragraph [ref=e265]: 80%
              - heading "Ownership split" [level=3] [ref=e266]
              - paragraph [ref=e267]: Your ownership split is shared between all the owners of the content based on the percentage that they own.
              - paragraph [ref=e268]: Content ownership will be recorded on a blockchain to allow for an independently auditable way to view who owns what, along with tamper-proof records of ownership changes.
            - generic [ref=e269]:
