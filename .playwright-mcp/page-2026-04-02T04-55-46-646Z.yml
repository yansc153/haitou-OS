              - heading "Platform split" [level=3] [ref=e272]
              - paragraph [ref=e273]: This is a 15% split of incoming revenue, which will go to anything that is integral to running the SuperHi platform. Such as paying staff, payment processing and hosting fees, as well as helping the ecosystem get continually better.
