            - heading "The tools you need to succeed" [level=2] [ref=e600]
            - paragraph [ref=e601]: What if there could be a radically different way to host your own digital content without being locked into one platform?
            - paragraph [ref=e602]: Our new tools are based on current SuperHi technology, which now hosts over 14 million files for hundreds of thousands of websites and will be available for all. The tools are built on top of standardized, open-source developer tools, such as Git and blockchains. This allows creators to control how they present their content.
            - list [ref=e605]:
              - listitem [ref=e606]:
                - img [ref=e609]
                - heading "No lock-in" [level=3] [ref=e611]
                - paragraph [ref=e612]: It’s your content, not the platforms! Tools built using distributed and decentralized methodologies mean that the content you make isn’t dependent on us to live and can run without the platform.
              - listitem [ref=e613]:
                - img [ref=e616]
                - heading "Collaboration, not competition" [level=3] [ref=e618]
                - paragraph [ref=e619]: Our access card infrastructure makes it easy for creators to make wholly different revenue models that don’t exist currently. Want to create a community access card that shares revenue transparently between your friends? Now it’s possible.
              - listitem [ref=e620]:
                - img [ref=e623]
                - heading "Your brand, not ours" [level=3] [ref=e625]
                - paragraph [ref=e626]: More Myspace, less Facebook. How people experience your content will likely be unique to you. With our tools, you have complete control over all parts of your content delivery, from logos to layout.
              - listitem [ref=e627]:
                - img [ref=e630]
                - heading "Wider distribution" [level=3] [ref=e632]
                - paragraph [ref=e633]: The access cards are built on top of NFT technology, which allows you to trade them on other platforms, import existing projects, or move your data away at any point. If you don’t love the SuperHi way, you’re not stuck with us.
