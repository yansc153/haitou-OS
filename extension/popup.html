<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #1a1a1a; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 12px; margin-bottom: 16px; }
    .platforms { display: flex; flex-direction: column; gap: 8px; }
    .platform { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 8px; }
    .platform-name { font-weight: 500; }
    .platform-status { font-size: 11px; color: #666; }
    .btn { padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-success { background: #16a34a; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .status-bar { margin-top: 12px; padding: 8px; border-radius: 6px; font-size: 12px; display: none; }
    .status-bar.show { display: block; }
    .status-bar.success { background: #f0fdf4; color: #166534; }
    .status-bar.error { background: #fef2f2; color: #991b1b; }
    .settings { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e5e5; }
    .settings input { width: 100%; padding: 6px 8px; border: 1px solid #e5e5e5; border-radius: 4px; font-size: 12px; margin-top: 4px; }
    .settings label { font-size: 11px; color: #666; }
  </style>
</head>
<body>
  <h1>海投助手</h1>
  <p class="subtitle">Export cookies to connect platforms</p>

  <div class="platforms" id="platforms"></div>
  <div class="status-bar" id="status"></div>

  <div class="settings">
    <label>Backend URL</label>
    <input type="text" id="backendUrl" placeholder="http://127.0.0.1:54321" />
    <label style="margin-top: 8px; display: block;">Auth Token</label>
    <input type="password" id="authToken" placeholder="Paste your Supabase auth token" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
