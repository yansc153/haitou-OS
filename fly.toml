# Fly.io configuration for orchestration worker
app = "haitou-os-worker"
primary_region = "sin"

[build]
  dockerfile = "src/worker/Dockerfile"

[env]
  NODE_ENV = "production"
  HEALTH_PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["worker"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"

[processes]
  worker = "node dist/worker/index.js"
